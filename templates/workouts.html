{% extends "base.html" %}

{% block content %}

<div class="container-fluid">

    <div class="d-flex justify-content-between align-items-center mb-4">

        <h2 class="fw-bold">
            🏋️ Workout Management
        </h2>

        <button
            class="btn btn-primary"
            onclick="openAddModal()">

            <i class="bi bi-plus-circle"></i>

            Assign Workout

        </button>

    </div>

    <div class="card shadow">

        <div class="card-body">

            <input
                type="text"
                id="searchBox"
                class="form-control mb-3"
                placeholder="Search Workouts...">

            <div class="table-responsive">

                <table class="table table-hover table-bordered align-middle">

                    <thead class="table-dark">

                        <tr>

                            <th>ID</th>
                            <th>Member</th>
                            <th>Trainer</th>
                            <th>Workout Type</th>
                            <th>Duration</th>
                            <th>Workout Date</th>
                            <th width="140">Actions</th>

                        </tr>

                    </thead>

                    <tbody id="workoutTable">

                    </tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<script>

loadWorkouts();

function loadWorkouts(){

    fetch("/workouts")

    .then(res => res.json())

    .then(data => {

        let rows = "";

        data.forEach(workout => {

            rows += `

            <tr>

                <td>${workout.workout_id}</td>

                <td>${workout.member_name}</td>

                <td>${workout.trainer_name}</td>

                <td>${workout.workout_type}</td>

                <td>${workout.duration} mins</td>

                <td>${workout.workout_date}</td>

                <td>

                    <button
                        class="btn btn-warning btn-sm"
                        onclick="editWorkout(${workout.workout_id})">

                        <i class="bi bi-pencil-square"></i>

                    </button>

                    <button
                        class="btn btn-danger btn-sm"
                        onclick="deleteWorkout(${workout.workout_id})">

                        <i class="bi bi-trash"></i>

                    </button>

                </td>

            </tr>

            `;

        });

        document.getElementById("workoutTable").innerHTML = rows;

    });

}

document.getElementById("searchBox")

.addEventListener("keyup", function(){

    let filter = this.value.toLowerCase();

    let rows = document.querySelectorAll("#workoutTable tr");

    rows.forEach(row => {

        row.style.display = row.innerText
            .toLowerCase()
            .includes(filter)

            ? ""

            : "none";

    });

});

// ----------------------------
// Load Members Dropdown
// ----------------------------
function loadMembersDropdown(){

    fetch("/members")

    .then(res => res.json())

    .then(data => {

        let options = "";

        data.forEach(member => {

            options += `
                <option value="${member.member_id}">
                    ${member.full_name}
                </option>
            `;

        });

        document.getElementById("member_id").innerHTML = options;

    });

}


// ----------------------------
// Load Trainers Dropdown
// ----------------------------
function loadTrainersDropdown(){

    fetch("/trainers")

    .then(res => res.json())

    .then(data => {

        let options = "";

        data.forEach(trainer => {

            options += `
                <option value="${trainer.trainer_id}">
                    ${trainer.full_name}
                </option>
            `;

        });

        document.getElementById("trainer_id").innerHTML = options;

    });

}


// ----------------------------
// Open Add Workout Modal
// ----------------------------
function openAddModal(){

    document.getElementById("modalTitle").innerHTML = "Assign Workout";

    document.getElementById("workoutId").value = "";

    loadMembersDropdown();

    loadTrainersDropdown();

    document.getElementById("workout_type").value = "";

    document.getElementById("duration").value = "";

    document.getElementById("workout_date").value = "";

    let modal = new bootstrap.Modal(
        document.getElementById("workoutModal")
    );

    modal.show();

}


// ----------------------------
// Save Workout
// ----------------------------
function saveWorkout(){

    const data = {
    member_id: document.getElementById("member_id").value,
    trainer_id: document.getElementById("trainer_id").value,
    workout_type: document.getElementById("workout_type").value,
    duration: document.getElementById("duration").value,
    workout_date: document.getElementById("workout_date").value
};

console.log(data);

    if(
        !data.member_id ||
        !data.trainer_id ||
        !data.workout_type ||
        isNaN(data.duration) ||
        !data.workout_date
    ){

        alert(
            "Member ID: " + data.member_id +
            "\nTrainer ID: " + data.trainer_id +
            "\nWorkout Type: " + data.workout_type +
            "\nDuration: " + data.duration +
            "\nWorkout Date: " + data.workout_date
        );
        return;

        return;

    }

    fetch("/workouts",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(data)

    })

    .then(res=>res.json())

    .then(result=>{

        alert(result.message);

        if(result.success){

            bootstrap.Modal
            .getInstance(document.getElementById("workoutModal"))
            .hide();

            loadWorkouts();

        }

    });

}

// ----------------------------
// Edit Workout
// ----------------------------
function editWorkout(workoutId){

    fetch(`/workouts/${workoutId}`)

    .then(res => res.json())

    .then(workout => {

        document.getElementById("modalTitle").innerHTML = "Edit Workout";

        document.getElementById("workoutId").value = workout.workout_id;

        loadMembersDropdown();

        loadTrainersDropdown();

        setTimeout(function(){

            document.getElementById("member_id").value = workout.member_id;

            document.getElementById("trainer_id").value = workout.trainer_id;

        },300);

        document.getElementById("workout_type").value = workout.workout_type;

        document.getElementById("duration").value = workout.duration;

        document.getElementById("workout_date").value = workout.workout_date;

        let modal = new bootstrap.Modal(
            document.getElementById("workoutModal")
        );

        modal.show();

    });

}


// ----------------------------
// Update Workout
// ----------------------------
function updateWorkout(){

    let workoutId = document.getElementById("workoutId").value;

    const data = {

        member_id: document.getElementById("member_id").value,

        trainer_id: document.getElementById("trainer_id").value,

        workout_type: document.getElementById("workout_type").value,

        duration: parseInt(
            document.getElementById("duration").value
        ),

        workout_date: document.getElementById("workout_date").value

    };

    if(
        !data.member_id ||
        !data.trainer_id ||
        !data.workout_type ||
        isNaN(data.duration) ||
        !data.workout_date
    ){

        alert("Please fill all required fields.");

        return;

    }

    fetch(`/workouts/${workoutId}`,{

        method:"PUT",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify(data)

    })

    .then(res => res.json())

    .then(result => {

        alert(result.message);

        if(result.success){

            bootstrap.Modal
            .getInstance(document.getElementById("workoutModal"))
            .hide();

            loadWorkouts();

        }

    });

}


// ----------------------------
// Delete Workout
// ----------------------------
function deleteWorkout(workoutId){

    if(!confirm("Are you sure you want to delete this workout?")){

        return;

    }

    fetch(`/workouts/${workoutId}`,{

        method:"DELETE"

    })

    .then(res => res.json())

    .then(result => {

        alert(result.message);

        loadWorkouts();

    });

}


// ----------------------------
// Save or Update
// ----------------------------
function saveOrUpdate(){

    let workoutId = document.getElementById("workoutId").value;

    if(workoutId==""){

        saveWorkout();

    }

    else{

        updateWorkout();

    }

}

</script>

<!-- ===========================
     Workout Modal
=========================== -->

<div class="modal fade" id="workoutModal" tabindex="-1">

    <div class="modal-dialog modal-lg">

        <div class="modal-content">

            <div class="modal-header bg-primary text-white">

                <h5 class="modal-title" id="modalTitle">

                    Assign Workout

                </h5>

                <button
                    type="button"
                    class="btn-close btn-close-white"
                    data-bs-dismiss="modal">
                </button>

            </div>

            <div class="modal-body">

                <input
                    type="hidden"
                    id="workoutId">

                <div class="row">

                    <!-- Member -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Member

                        </label>

                        <select
                            id="member_id"
                            class="form-select">

                        </select>

                    </div>

                    <!-- Trainer -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Trainer

                        </label>

                        <select
                            id="trainer_id"
                            class="form-select">

                        </select>

                    </div>

                    <!-- Workout Type -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Workout Type

                        </label>

                        <input
                            type="text"
                            id="workout_type"
                            class="form-control"
                            placeholder="Weight Training">

                    </div>

                    <!-- Duration -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Duration (Minutes)

                        </label>

                        <input
                            type="number"
                            id="duration"
                            class="form-control"
                            placeholder="60">

                    </div>

                    <!-- Workout Date -->

                    <div class="col-md-6 mb-3">

                        <label class="form-label">

                            Workout Date

                        </label>

                        <input
                            type="date"
                            id="workout_date"
                            class="form-control">

                    </div>

                </div>

            </div>

            <div class="modal-footer">

                <button
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">

                    Cancel

                </button>

                <button
                    class="btn btn-primary"
                    onclick="saveOrUpdate()">

                    <i class="bi bi-check-circle"></i>

                    Save

                </button>

            </div>

        </div>

    </div>

</div>

{% endblock %}
