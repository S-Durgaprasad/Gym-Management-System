<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>Gym Management System</title>

    <meta name="viewport"
          content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet">

    <!-- Custom CSS -->

    <link
    rel="stylesheet"
    href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container-fluid">

        <a class="navbar-brand fw-bold" href="/">
            🏋 Gym Management System
        </a>

        <div class="ms-auto d-flex align-items-center">

            <span class="text-white me-4" id="currentDate"></span>

            <i class="bi bi-bell-fill text-white fs-4 me-3"></i>

            <div class="dropdown">
                <button class="btn btn-outline-light dropdown-toggle"
                        data-bs-toggle="dropdown">
                    Admin
                </button>

                <ul class="dropdown-menu dropdown-menu-end">
                    <li><a class="dropdown-item" href="#">Profile</a></li>
                    <li><a class="dropdown-item" href="#">Settings</a></li>
                    <li><hr class="dropdown-divider"></li>
                    <li><a class="dropdown-item" href="#">Logout</a></li>
                </ul>
            </div>

        </div>

    </div>
</nav>

<div class="d-flex">

    <div class="sidebar">

        <h3 class="text-center my-4">🏋 GymMS</h3>

        <a href="/">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a href="/members-page">
            <i class="bi bi-people-fill"></i> Members
        </a>

        <a href="/trainers-page">
            <i class="bi bi-person-workspace"></i> Trainers
        </a>

        <a href="/memberships-page">
            <i class="bi bi-card-checklist"></i> Memberships
        </a>

        <a href="/attendance-page">
            <i class="bi bi-calendar-check"></i> Attendance
        </a>

        <a href="/payments-page">
            <i class="bi bi-credit-card"></i> Payments
        </a>

        <a href="/workouts-page">
            <i class="bi bi-heart-pulse"></i> Workouts
        </a>

        <a href="/analytics-page">
            <i class="bi bi-bar-chart-fill"></i> Analytics
        </a>

    </div>

    <div class="content">
        {% block content %}{% endblock %}
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("currentDate").innerHTML =
new Date().toLocaleString();
</script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</body>

</html>
